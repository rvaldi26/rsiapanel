<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Maris - Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .step-card { display: none; }
        .step-card.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden lg:flex flex-col w-64 bg-slate-900 fixed h-full text-white p-6">
        <div class="flex items-center gap-3 mb-10">
            <span class="text-3xl">🏥</span>
            <div>
                <h1 class="font-bold leading-none">Stella Maris</h1>
                <p class="text-[10px] text-slate-400 tracking-widest mt-1 uppercase">Admin Panel</p>
            </div>
        </div>

        <nav class="flex-1 space-y-2">
            <button onclick="showStep('fo')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition-all active-nav" data-step="fo">
                <span>📝</span> Front Office
            </button>
            <button onclick="showStep('perawat')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition-all" data-step="perawat">
                <span>🩺</span> Perawat
            </button>
            <button onclick="showStep('dokter')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition-all" data-step="dokter">
                <span>👨‍⚕️</span> Dokter
            </button>
            <button onclick="showStep('farmasi')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition-all" data-step="farmasi">
                <span>💊</span> Farmasi & Kasir
            </button>
            <button onclick="showStep('histori')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition-all" data-step="histori">
                <span>📜</span> Histori Data
            </button>
        </nav>

        <div id="mqtt-status" class="bg-slate-800 p-3 rounded-xl text-[10px] flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> MQTT Disconnected
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="lg:ml-64 min-h-screen">
        
        <!-- Top Header -->
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-40">
            <div>
                <h2 id="page-title" class="font-bold text-slate-800">Front Office</h2>
                <p id="current-time" class="text-xs text-slate-400 font-mono"></p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-bold leading-none">Administrator</p>
                    <p class="text-[10px] text-green-500">System Online</p>
                </div>
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center font-bold text-indigo-600">AD</div>
            </div>
        </header>

        <div class="p-4 md:p-8 max-w-5xl mx-auto pb-32 lg:pb-8">
            
            <!-- 1. FRONT OFFICE -->
            <section id="fo" class="step-card active">
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold mb-6">Pendaftaran Pasien Baru</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">ID Pasien</label>
                            <input type="text" id="fo_id" placeholder="P001" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 ring-indigo-500 outline-none uppercase font-mono">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Nama Lengkap</label>
                            <input type="text" id="fo_nama" placeholder="Contoh: Ibu Ani" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <button onclick="daftarPasien()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all">DAFTAR & CETAK ANTRIAN</button>
                </div>
            </section>

            <!-- 2. PERAWAT -->
            <section id="perawat" class="step-card">
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold mb-6">Pemeriksaan Vital</h3>
                    <div class="space-y-4">
                        <select id="sel_perawat" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold"></select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="p_bb" placeholder="BB (kg)" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                            <input type="number" id="p_suhu" placeholder="Suhu (°C)" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                        </div>
                        <button onclick="simpanPerawat()" class="w-full bg-green-600 text-white p-4 rounded-2xl font-bold">KIRIM KE DOKTER</button>
                    </div>
                </div>
            </section>

            <!-- 3. DOKTER -->
            <section id="dokter" class="step-card">
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold mb-6">Diagnosa Dokter</h3>
                    <select id="sel_dokter" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold mb-4" onchange="loadVitalData()"></select>
                    <div id="vital_info" class="hidden p-4 bg-indigo-50 rounded-2xl mb-4 text-sm text-indigo-700 font-medium"></div>
                    <textarea id="d_diag" placeholder="Hasil Diagnosa..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl h-32 mb-4 outline-none focus:ring-2 ring-indigo-500"></textarea>
                    <input type="text" id="d_resep" placeholder="Resep Obat" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-6 font-bold">
                    <button onclick="simpanDokter()" class="w-full bg-red-600 text-white p-4 rounded-2xl font-bold">SIMPAN DIAGNOSA</button>
                </div>
            </section>

            <!-- 4. FARMASI & KASIR -->
            <section id="farmasi" class="step-card">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold mb-4 flex items-center gap-2"><span>💊</span> Farmasi</h4>
                        <select id="sel_farmasi" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4" onchange="loadResep()"></select>
                        <div id="resep_box" class="p-4 bg-yellow-50 rounded-2xl border border-yellow-100 text-yellow-800 text-sm italic min-h-[100px]">Pilih pasien untuk melihat resep...</div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                        <h4 class="font-bold mb-4 flex items-center gap-2 text-indigo-400"><span>💳</span> Billing Kasir</h4>
                        <div class="space-y-4">
                            <div class="flex justify-between border-b border-slate-800 pb-2">
                                <span class="text-slate-500 text-xs">Pasien:</span>
                                <span id="bill_nama" class="font-bold text-sm">-</span>
                            </div>
                            <input type="number" id="b_dokter" placeholder="Biaya Konsultasi" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none">
                            <input type="number" id="b_obat" placeholder="Biaya Obat" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none">
                            <button onclick="prosesBilling()" class="w-full bg-indigo-500 p-4 rounded-xl font-bold hover:bg-indigo-400">SIMPAN & SELESAI</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5. HISTORI -->
            <section id="histori" class="step-card">
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-slate-400 uppercase tracking-widest">Pasien</th>
                                <th class="p-4 text-slate-400 uppercase tracking-widest">Diagnosa</th>
                                <th class="p-4 text-slate-400 uppercase tracking-widest">Biaya</th>
                            </tr>
                        </thead>
                        <tbody id="histori_table"></tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <!-- MOBILE NAVIGATION (Visible only on mobile) -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="showStep('fo')" class="flex flex-col items-center gap-1">
            <span class="text-lg">📝</span><span class="text-[9px] font-bold">FO</span>
        </button>
        <button onclick="showStep('perawat')" class="flex flex-col items-center gap-1">
            <span class="text-lg">🩺</span><span class="text-[9px] font-bold">PRW</span>
        </button>
        <button onclick="showStep('dokter')" class="flex flex-col items-center gap-1">
            <span class="text-lg">👨‍⚕️</span><span class="text-[9px] font-bold">DR</span>
        </button>
        <button onclick="showStep('farmasi')" class="flex flex-col items-center gap-1">
            <span class="text-lg">💊</span><span class="text-[9px] font-bold">KASIR</span>
        </button>
        <button onclick="showStep('histori')" class="flex flex-col items-center gap-1">
            <span class="text-lg">📜</span><span class="text-[9px] font-bold">LOG</span>
        </button>
    </nav>

    <script>
        // MQTT & DB LOGIC
        const MQTT_BROKER = 'wss://test.mosquitto.org:8081';
        const TOPIC_SYNC = "stellamaris/data/update";
        const client = mqtt.connect(MQTT_BROKER);

        let antrian = JSON.parse(localStorage.getItem('rs_antrian')) || {};
        let histori = JSON.parse(localStorage.getItem('rs_histori')) || [];

        // TIME DISPLAY
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        // MQTT HANDLERS
        client.on('connect', () => {
            document.getElementById('mqtt-status').innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> MQTT Online';
            document.getElementById('mqtt-status').classList.add('text-green-400');
            syncToMQTT();
        });

        function syncToMQTT() {
            if(client.connected) {
                const payload = { antrian, histori: histori.slice(0, 10) };
                client.publish(TOPIC_SYNC, JSON.stringify(payload), { retain: true });
            }
        }

        // APP LOGIC
        function showStep(id) {
            document.querySelectorAll('.step-card').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Update Title & Sidebar UI
            document.getElementById('page-title').innerText = id.toUpperCase();
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'border-l-4', 'border-indigo-500');
                if(btn.dataset.step === id) btn.classList.add('bg-white/10', 'border-l-4', 'border-indigo-500');
            });

            updateDropdowns();
            if(id === 'histori') renderHistori();
        }

        function daftarPasien() {
            const id = document.getElementById('fo_id').value.toUpperCase();
            const nama = document.getElementById('fo_nama').value;
            if(!id || !nama) return alert("Isi ID dan Nama!");
            antrian[id] = { id, nama, status: 'daftar', timestamp: new Date().toLocaleTimeString() };
            save();
            alert("Pendaftaran Berhasil");
            document.getElementById('fo_id').value = ''; document.getElementById('fo_nama').value = '';
        }

        function simpanPerawat() {
            const id = document.getElementById('sel_perawat').value;
            if(!id) return alert("Pilih pasien!");
            antrian[id].vital = { bb: document.getElementById('p_bb').value, suhu: document.getElementById('p_suhu').value };
            antrian[id].status = 'perawat_done';
            save();
            alert("Data Vital Terkirim");
        }

        function simpanDokter() {
            const id = document.getElementById('sel_dokter').value;
            if(!id) return alert("Pilih pasien!");
            antrian[id].diagnosa = document.getElementById('d_diag').value;
            antrian[id].resep = document.getElementById('d_resep').value;
            antrian[id].status = 'dokter_done';
            save();
            alert("Diagnosa Disimpan");
        }

        function prosesBilling() {
            const id = document.getElementById('sel_farmasi').value;
            const bD = parseInt(document.getElementById('b_dokter').value || 0);
            const bO = parseInt(document.getElementById('b_obat').value || 0);
            if(!id) return alert("Pilih pasien!");
            
            const data = { ...antrian[id], biaya: bD + bO, selesai: new Date().toLocaleString() };
            histori.unshift(data);
            delete antrian[id];
            save();
            alert("Billing Selesai");
            showStep('histori');
        }

        function save() {
            localStorage.setItem('rs_antrian', JSON.stringify(antrian));
            localStorage.setItem('rs_histori', JSON.stringify(histori));
            updateDropdowns();
            syncToMQTT();
        }

        function updateDropdowns() {
            const sp = document.getElementById('sel_perawat');
            const sd = document.getElementById('sel_dokter');
            const sf = document.getElementById('sel_farmasi');
            const opt = '<option value="">-- Pilih Pasien --</option>';
            sp.innerHTML = opt; sd.innerHTML = opt; sf.innerHTML = opt;

            Object.values(antrian).forEach(p => {
                const o = `<option value="${p.id}">${p.nama} (${p.id})</option>`;
                if(p.status === 'daftar') sp.innerHTML += o;
                if(p.status === 'perawat_done') sd.innerHTML += o;
                if(p.status === 'dokter_done') sf.innerHTML += o;
            });
        }

        function loadVitalData() {
            const id = document.getElementById('sel_dokter').value;
            const box = document.getElementById('vital_info');
            if(id && antrian[id].vital) {
                box.innerHTML = `Hasil Perawat: BB ${antrian[id].vital.bb}kg | Suhu ${antrian[id].vital.suhu}°C`;
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function loadResep() {
            const id = document.getElementById('sel_farmasi').value;
            document.getElementById('resep_box').innerText = id ? antrian[id].resep : "Pilih pasien...";
            document.getElementById('bill_nama').innerText = id ? antrian[id].nama : "-";
        }

        function renderHistori() {
            document.getElementById('histori_table').innerHTML = histori.map(h => `
                <tr class="border-b">
                    <td class="p-4 font-bold">${h.nama}<br><span class="text-[10px] text-slate-400 uppercase font-mono">${h.id}</span></td>
                    <td class="p-4 text-slate-600">${h.diagnosa}</td>
                    <td class="p-4 text-green-600 font-bold">Rp${h.biaya.toLocaleString()}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
